description: 'Two threads surfaced in the s009 t5 session, broadened by the s009.x batch. (1) DEFAULT CONFIG / TEMPLATES: `mtt init` ships an epic/task/subtask hierarchy where `task` REQUIRES a parent — a smoke test hit "type task requires a parent; use --parent". The default templates (default.yaml/coding.yaml) ergonomics need review vs what a fresh project actually wants (a flat task/chore default like this repo dogfoods? a gentler onboarding default? keep the hierarchy but make the entry type root?) — i.e. tidy the default config templates. (2) BOOTSTRAP THE RUNBOOK: `mtt init` should help a new project adopt the workflow — emit or scaffold an AGENTS.md "Working under mtt" section so a fresh project agents know the flow (attribution, gates, dangerous-ops, the per-move commit) WITHOUT hand-authoring it. (3) SCAFFOLD AGENT DOCS: extend the scaffolding beyond AGENTS.md to also emit/update a root CLAUDE.md and per-package CLAUDE.md stubs (and similar agent docs, e.g. GEMINI.md), so a fresh project gets the in-code doc hierarchy, not just the runbook — decide the template set, new-file-vs-merge behavior, and how templates stay honest as the flow evolves. Design-open: the default config, whether/how init writes/updates these docs, relation to t19 (self-instructing runbook in flow descriptions) and the prime directive "mechanize the process into mtt". (Absorbs the s009.x asks to tidy default templates and to provide AGENTS.md/CLAUDE.md init templates.)'
