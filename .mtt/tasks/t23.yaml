description: 'PART B of the original 3-thread t23 (split 2026-07-17); Part A (scaffold how-to-use-mtt agent docs) is t46. Engine is NOT touched here — the fix is config-level only. Problem: mtt init ships default.yaml where ''task'' is default:true but parents:[epic] (non-root), so the natural first command ''mtt add "x"'' fails with ''type task requires a parent''. That error is CORRECT — ''requires a parent'' is a property of a hierarchy config, not an engine bug. Deliver: (1) new FLAT ''default'' template — task(root, default) + chore(root), minimal generic flow (tbd->in_progress->done/cancelled, current set/clear), no make/git/spec assumptions, so ''mtt add'' works out of the box; (2) preserve today''s epic/task/subtask config VERBATIM as a new ''hierarchy'' template (keeps the parent-required placement discipline); (3) ''coding'' untouched (no ergonomics bug; demo polish is t4). Tests: ergonomics regression (fresh default init -> ''mtt add'' succeeds at root), per-template validity (render->Load->Validate for all three), goldens (+hierarchy), migrate the 12 e2e scripts that build epic->task->subtask to ''--template hierarchy''. Docs-sync EN+RU (CLI_REFERENCE/DESIGN/README template mentions, internal/adapter/yaml/CLAUDE.md). Unblocks t4; feeds t42.'
