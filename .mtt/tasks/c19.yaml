description: 'Decision record (2026-07-24 discussion, closes the t32 think - see its cancel why): mtt stays a dumb mechanism and keeps --no-run as the SIGNED bypass of client-authored procedure. Removing it would not remove bypasses (a local config edit is the unsigned backdoor) - it would only kill the audited path (--no-run demands --who and --why and records them in history). No engine-level command classes: a gate-vs-context label would rest on the client word and guarantee nothing. What ships instead is documentation symmetry: the danger is not the flag, it is the commands the author put on the edge - equally under execution and under bypass. Deliverables: (1) CLI_REFERENCE EN+RU, --no-run section: bypass skips ALL commands on the edge including state-moving ones (e.g. a git switch) - a bypassed context-switching edge writes its state wherever the tree currently is; (2) FLOW_GUIDE EN+RU authoring caveat: if your edges move state, author them knowing --no-run skips those commands too; (3) dogfood config: add the warning to the deliver and cancel edge descriptions (self-instructing runbook) + update the guard-test description assertions; (4) one rationale line in DESIGN EN+RU trust-model text: --no-run is kept as the signed bypass because the unsigned alternative (local config edit) is invisible.'
