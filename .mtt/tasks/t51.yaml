description: |-
    Expert-flagged adoption gap: agents lack an auto-injected KB summary at session start (analog of beads prime/remember), wired via a Claude Code sessionStart hook. mtt provides the command (e.g. mtt prime); the hook itself is thin config (settings.json) or documented in t46.

    Design-OPEN — brainstorm first (think):
    - Curation is OPT-IN, never dump-all (a note may hold sensitive/large content -> context-leak + budget risk; the maintainers explicit concern).
    - Ranking: Note.Priority VO (mirror task priority s008.6) vs a reserved tag vs backlink-count (t1 gives it for free). Lean: Note.Priority as the primary axis + backlink-count as a tiebreak.
    - Bounded output (top-N or a token budget); markdown digest; optionally include the roadmap head.
    Builds on t47 (notes exist) + t1 (refs/backlinks give a ranking signal). Safety = opt-in + size cap answers the dump-all risk.
