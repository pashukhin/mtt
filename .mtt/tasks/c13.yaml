description: 'Verified (audit 2026-07-22): a pasted URL like example.com/page(hash)anchor mints the tag anchor, and the tag-rm guard then refuses removal because the hashtag is present in the text — no escape short of editing the URL out; a title with embedded newlines renders as multiple rows in list/tree, indistinguishable from separate tasks for line-oriented consumers (JSON escapes correctly). Fixed design: the extractor skips fragments inside URLs (anything with a scheme://); add/edit reject newlines in the title with a usage error (description stays free-form).'
