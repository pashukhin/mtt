description: |-
    A user-visible change (a command, flag, --json field, exit code, or store-schema change) should add a CHANGELOG [Unreleased] entry; otherwise the changelog drifts and a release cut gets expensive (had to reconstruct [Unreleased] by hand when cutting v0.9.0). Add an automated guard.

    Design-open (think): (1) What counts as user-visible? A diff-path heuristic (touches internal/cli, pkg/mtt, adds a command/flag) vs an explicit opt-out. (2) Where does it live? A CI PR check, a make target, or -- per the AGENTS TL;DR rule 0 (mechanize the process into mtt) -- a flow gate on implementing->impl_review (or approve) that fails when the diff looks user-visible but CHANGELOG.md [Unreleased] is unchanged on the branch. (3) False-positive control: changelog-worthiness is judgment; the guard must be skippable with a reason (like --no-run) so pure refactors/tests/docs are not blocked. Reinforces the RELEASING "Release cadence" discipline.
