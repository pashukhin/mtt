description: 'Design-open cleanup from the arch review 2026-07-22 — the bar-raising refactor behind the c16 symptom-patch (NOT a release blocker; do after the release-gating chores). Two review agents independently named this the highest-leverage change. Scope: (1) pull the transitive dep-tree walk and tree.go keep-ancestors selection OUT of the CLI into core (DepGraph.Visit or a core walker) with an explicit revisit policy, so text and JSON share ONE traversal (root cause of the c16 diamond bug); (2) collapse the 5x-copy-pasted filter-flag registration into one helper parameterized by exposed dimensions (root cause of the c16 asymmetries), plus the duplicated --sort validation and --ids/--json exclusivity loop; (3) DDD seam smells: remodel AuditEntry''s subject so note rm stops casting a slug to TaskID into committed JSONL (agent A''s headline pick), give ports one home (Runner in core vs release ports in pkg/mtt — pick a rule), move CLI flag names out of core error strings into the sentinel taxonomy, extract one loadTask/loadNote helper (Get+wrap copy-pasted 6x, 2 divergent conventions), define the ErrUnsupported that store.go''s doc promises, and give parseRefArg/referentIDs a domain home (mtt.NewRef / core.NoteRemover). References c16.'
