description: 'Reclassified from task t39 (design fixed in brainstorm). New pure read-only command (like roadmap/tree — TaskStore.List then core.Select then aggregate; no usecase). Default scope = OPEN tasks (kind initial+active, i.e. not done/cancelled); --all counts every task. Respects the list/ready filters (--status/--type/--kind/--tag/--exclude-tag/--priority/--parent) via the same core.Select, then counts tags across the filtered set. Human output: rows "count  tag" sorted by count DESC then tag ASC. --json: array of {tag, count} in the same order. Counts backlog like any tag. Replaces the AGENTS.md jq workaround. Depends on c8 (--exclude-tag) since it respects that filter.'
