description: 'Verified footgun (audit 2026-07-22): every doc calls config.local.yaml gitignored, but nothing gitignores it and init does not warn; with dogfood-style post actions (git add .mtt) the personal file — author plus the current pointer — lands in the shared repo, guaranteeing merge conflicts between agents. Fixed design: mtt init writes .mtt/.gitignore containing config.local.yaml (create-if-absent, never clobber an existing file); keep it self-contained under .mtt/ — do not touch the project root .gitignore. Existing adopters get a README note.'
