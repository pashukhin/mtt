version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - misspell
    - revive
    - unconvert
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/pashukhin/mtt
