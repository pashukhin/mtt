name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt required for:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.2.2

      - name: test
        run: go test -race -cover ./...

      # Regression guard for c4: a hostile MTT_* in the caller's env must not reach
      # the tests (the cli harness scrubs it). -count=1 defeats the cache so this
      # actually runs; a regressed scrub reddens here even though the clean run above
      # stays green.
      - name: test (hostile MTT_* env — harness must scrub)
        env:
          MTT_DIR: /tmp
          MTT_BY: ci-should-be-scrubbed
          MTT_ROLE: ci-should-be-scrubbed
        run: go test -count=1 ./...

      - name: build
        run: go build ./...
